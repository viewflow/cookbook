{% extends "viewflow/workflow/base_page.html" %}
{% load i18n viewflow workflow %}

{% block content %}
  <div class="mdc-layout-grid vf-page__grid">
    <div class="mdc-layout-grid__inner vf-page__grid-inner">
      <div class="mdc-layout-grid__cell mdc-layout-grid__cell--span-8-desktop mdc-layout-grid__cell--span-8-tablet mdc-layout-grid__cell--span-4-phone">
        <div class="mdc-card vf-card">
          <section class="vf-card__header">
            <h1 class="vf-card__title">{% trans 'Add item to order' %} #{{ process.pk }}</h1>
          </section>
          <div style="padding:16px">
            <form id="add-item-form" class="vf-form" method="POST">
              {% csrf_token %}
              <p>
                <label for="{{ form.title.id_for_label }}">{{ form.title.label }}</label><br>
                {{ form.title }}
              </p>
              {% for error in form.title.errors %}<p style="color:#b00020">{{ error }}</p>{% endfor %}
            </form>
          </div>
          <div class="mdc-card__actions vf-card__actions">
            <button type="submit" form="add-item-form"
                    class="mdc-button mdc-button--raised mdc-card__action mdc-card__action--button">
              <div class="mdc-button__ripple"></div>
              <span class="mdc-button__label">{% trans 'Add item' %}</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
